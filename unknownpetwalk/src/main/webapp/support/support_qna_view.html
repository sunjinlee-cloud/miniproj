<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QNA View</title>
    <link rel="stylesheet" href="../css/support_qna_view.css">
</head>

<body>
    <section>
        <p class="qna">문의내역</p>
        <hr class="qna-line">

        <ul class="qna-name">
            <li>
                <div>우리 개도 맡길 수 있어요?</div>
            </li>
            <li class="qna-fo">작성자</li>
            <li class="qna-li">유저</li>
            <li class="qna-fo">작성일</li>
            <li class="qna-li">2025-03-12</li>
            <li class="qna-fo">문의유형</li>
            <li class="qna-li">기타</li>
        </ul>

        <hr>

        <div class="qna-content">
            <p>
                안녕하세요. 저희 개를 맡길 수 있나요?
            </p>
        </div>

        <hr>

        <div class="qna-btn">
            <button type="button" onclick="goToUpdate()">수정</button>
            <button type="button" onclick="deleteQna()">삭제</button>
        </div>
    </section>

    <script>
        // 수정 버튼 클릭 시 write.html 이동 (QNA 수정용)
        function goToUpdate() {
            // 예시: qnaNum 파라미터를 넘기는 방식
            const qnaNum = 123; // 실제 구현 시 해당 글의 QNA_NUM 값을 동적으로 넣어야 함
            window.location.href = `/unknownpetwalk/support/qna_updateForm.qna?qnaNum=${qnaNum}`;
        }

        // 삭제 버튼 클릭 시 삭제 confirm → 실제 삭제 URL 호출
        function deleteQna() {
            if (confirm('정말 삭제하시겠습니까?')) {
                const qnaNum = 123; // 실제 구현 시 해당 글의 QNA_NUM 값을 동적으로 넣어야 함
                window.location.href = `/unknownpetwalk/support/qna_delete.qna?qnaNum=${qnaNum}`;
            }
        }
    </script>
</body>

</html>
