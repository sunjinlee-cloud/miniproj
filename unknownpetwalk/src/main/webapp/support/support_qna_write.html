<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/support_qna_write.css">
</head>

<body>


    <section>
        <p class="qna">문의하기</p>
        <hr style="margin-bottom: 30px;">	
        
        <form action="/unknownpetwalk/support/qna_insert.qna" class="mb-form" method="post" id="qnaForm">
            <ul class="mb-name">
                <li><input type="text" placeholder="제목" name="qnaTitle"></li>              
            </ul>
            <div class="mb-content">
                <textarea placeholder="글내용" class="mb-intro" name="qnaContent"></textarea>
            </div>
            <div class="mb-submit">
            <input type="hidden" name="qnaNum" value="${qna.qnaNum}">
            <input type="hidden" name="memNum" value="${sessionScope.loginUser.memNum}">
                <input type="submit" value="등록">
            </div>
        </form>
    </section>

    <script>
    
        document.getElementById('qnaForm').addEventListener("submit", function(e){
    if(!confirm('등록하시겠습니까?')){
        e.preventDefault(); // 취소 시만 막기
    }
});
        
    </script>


    
</body>

</html>
